<!-- 
  Offline-Ready Form Template Examples
  Add data-offline-queue="true" to forms that should queue offline
-->

<!-- Example 1: Basic Form with Offline Queueing -->
<form method="POST" action="/evaluation/submit/" data-offline-queue="true">
  {% csrf_token %}
  <div class="form-group">
    <label for="marks">Evaluation Marks</label>
    <input type="number" id="marks" name="marks" required />
  </div>
  <button type="submit" class="btn btn-primary">Submit</button>
</form>

<!-- 
  When offline:
  1. User fills form
  2. Clicks Submit
  3. Form queued locally
  4. Shows "✓ Saved offline"
  5. Auto-syncs when online
-->


<!-- Example 2: Django Crispy Forms with Offline Support -->
{% load crispy_forms_tags %}

<form method="POST" data-offline-queue="true">
  {% csrf_token %}
  {{ form|crispy }}
  <button type="submit" class="btn btn-success">Save</button>
</form>

<!-- Example 4: Form with Offline Detection -->
<form method="POST" id="dynamic-form">
  {% csrf_token %}
  
  <input type="text" name="title" placeholder="Enter title" />
  
  <!-- Set offline-queue dynamically based on connectivity -->
  <script>
    const form = document.getElementById('dynamic-form');
    function updateFormOfflineState() {
      if (navigator.onLine) {
        form.removeAttribute('data-offline-queue');
      } else {
        form.setAttribute('data-offline-queue', 'true');
      }
    }
    
    window.addEventListener('online', updateFormOfflineState);
    window.addEventListener('offline', updateFormOfflineState);
    updateFormOfflineState(); // Initial state
  </script>
  
  <button type="submit" class="btn btn-primary">Submit</button>
</form>


<!-- Example 5: Fetch API with Offline Queueing -->
<script>
// For API calls (not form submissions)
function submitDataOffline(data) {
  if (navigator.onLine) {
    // Online: send immediately
    fetch('/api/evaluation/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
      },
      body: JSON.stringify(data)
    }).then(response => response.json())
      .then(result => {
        console.log('Synced:', result);
        showNotification('✓ Data saved!', 'success');
      });
  } else {
    // Offline: queue for later
    window.offlineManager.queueOperation('POST', '/api/evaluation/', data)
      .then(() => {
        showNotification('✓ Saved offline. Will sync when online.', 'info');
      });
  }
}

// Usage
function handleFormSubmit(event) {
  event.preventDefault();
  const formData = new FormData(event.target);
  const data = Object.fromEntries(formData);
  submitDataOffline(data);
}
</script>


<!-- Example 6: List View with Offline Cache -->
<div class="evaluations-list">
  <h2>My Evaluations</h2>
  
  <script>
    // Load evaluations with offline cache
    async function loadEvaluations() {
      const url = '/api/evaluations/';
      
      try {
        // Try online first
        const response = await fetch(url);
        const data = await response.json();
        
        // Cache for offline
        await window.offlineManager.saveOfflineData('evaluations', data);
        
        renderEvaluations(data);
      } catch (error) {
        // Offline: use cached data
        const cachedData = await window.offlineManager.getOfflineData('evaluations');
        if (cachedData) {
          renderEvaluations(cachedData);
          showNotification('⚠️ Showing cached data (offline)', 'info');
        } else {
          showNotification('❌ No data available offline', 'error');
        }
      }
    }
    
    function renderEvaluations(data) {
      const html = data.map(eval => `
        <div class="evaluation-card">
          <h3>${eval.title}</h3>
          <p>Status: ${eval.status}</p>
          <a href="/evaluation/${eval.id}/">View</a>
        </div>
      `).join('');
      
      document.querySelector('.evaluations-list').innerHTML = html;
    }
    
    loadEvaluations();
  </script>
  
  <div id="evaluations-container"></div>
</div>

<!-- Example 8: Upload with Offline Queueing -->
<form id="upload-form">
  {% csrf_token %}
  
  <input type="file" name="document" required />
  <button type="submit" class="btn btn-primary">Upload</button>
  
  <script>
    document.getElementById('upload-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData(e.target);
      
      if (navigator.onLine) {
        // Online: upload immediately
        const response = await fetch('/api/upload/', {
          method: 'POST',
          body: formData,
          headers: {
            'X-CSRFToken': formData.get('csrfmiddlewaretoken')
          }
        });
        
        if (response.ok) {
          showNotification('✓ Uploaded!', 'success');
        }
      } else {
        // Offline: queue for sync
        // Note: For files, store reference for later upload
        const file = formData.get('document');
        
        window.offlineManager.queueOperation('POST', '/api/upload/', {
          fileName: file.name,
          fileSize: file.size,
          uploadedAt: new Date().toISOString()
        }).then(() => {
          showNotification('✓ File queued. Will upload when online.', 'info');
        });
      }
    });
  </script>
</form>


<!-- Example 9: Show Offline Status in UI -->
<div id="sync-status">
  <script>
    // Update UI based on sync status
    function updateSyncStatus() {
      const status = document.getElementById('sync-status');
      
      if (navigator.onLine) {
        status.innerHTML = '🟢 Online - Changes syncing...';
        status.classList.add('online');
        status.classList.remove('offline');
      } else {
        status.innerHTML = '🔴 Offline - Changes saved locally';
        status.classList.add('offline');
        status.classList.remove('online');
      }
    }
    
    window.addEventListener('online', updateSyncStatus);
    window.addEventListener('offline', updateSyncStatus);
    updateSyncStatus();
  </script>
</div>

<style>
  #sync-status {
    padding: 10px;
    border-radius: 4px;
    font-weight: bold;
  }
  
  #sync-status.online {
    background: rgba(82, 183, 136, 0.1);
    color: #52b788;
    border-left: 4px solid #52b788;
  }
  
  #sync-status.offline {
    background: rgba(239, 83, 80, 0.1);
    color: #ef5350;
    border-left: 4px solid #ef5350;
  }
</style>


<!-- Example 10: Complex Form with Validation -->
<form method="POST" data-offline-queue="true" id="complex-form">
  {% csrf_token %}
  
  <fieldset>
    <legend>Agniveer Details</legend>
    
    <div class="form-group">
      <label for="name">Name *</label>
      <input type="text" id="name" name="name" required />
    </div>
    
    <div class="form-group">
      <label for="rank">Rank *</label>
      <select id="rank" name="rank" required>
        <option value="">Select Rank</option>
        <option value="private">Private</option>
        <option value="lance">Lance Naik</option>
        <option value="naik">Naik</option>
      </select>
    </div>
  </fieldset>
  
  <fieldset>
    <legend>Evaluation</legend>
    
    <div class="form-group">
      <label for="theory">Theory Marks *</label>
      <input type="number" id="theory" name="theory" min="0" max="100" required />
    </div>
    
    <div class="form-group">
      <label for="practical">Practical Marks *</label>
      <input type="number" id="practical" name="practical" min="0" max="100" required />
    </div>
    
    <div class="form-group">
      <label for="comments">Comments</label>
      <textarea id="comments" name="comments" rows="4"></textarea>
    </div>
  </fieldset>
  
  <div class="form-actions">
    <button type="submit" class="btn btn-success">Submit Evaluation</button>
    <button type="reset" class="btn btn-secondary">Clear Form</button>
  </div>
  
  <script>
    // Form validation before offline queueing
    document.getElementById('complex-form').addEventListener('submit', (e) => {
      const theory = parseInt(document.getElementById('theory').value || 0);
      const practical = parseInt(document.getElementById('practical').value || 0);
      
      if (theory < 0 || theory > 100) {
        e.preventDefault();
        alert('Theory marks must be between 0 and 100');
        return false;
      }
      
      if (practical < 0 || practical > 100) {
        e.preventDefault();
        alert('Practical marks must be between 0 and 100');
        return false;
      }
      
      // Form will auto-queue if offline
      if (!navigator.onLine) {
        // Show confirmation for offline submission
        if (!confirm('You are offline. Save this form for sync later?')) {
          e.preventDefault();
        }
      }
    });
  </script>
</form>


<!-- Notification Helper -->
<script>
function showNotification(message, type = 'info') {
  const notification = document.createElement('div');
  notification.className = `notification notification-${type}`;
  notification.textContent = message;
  notification.style.cssText = `
    position: fixed;
    top: 50px;
    right: 20px;
    background: ${type === 'error' ? '#ef5350' : type === 'success' ? '#52b788' : '#4fc3f7'};
    color: white;
    padding: 12px 20px;
    border-radius: 4px;
    z-index: 10000;
    font-size: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  `;
  document.body.appendChild(notification);
  setTimeout(() => notification.remove(), 3000);
}
</script>
